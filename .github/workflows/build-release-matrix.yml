name: Build OpenSSH multi-platform artifacts

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - '**.c'
      - '**.h'
      - '**.m4'
      - '**.sh'
      - '**/Makefile.in'
      - 'configure.ac'
      - '.github/configs'
      - '.github/*.sh'
      - '.github/workflows/build-release-matrix.yml'

jobs:
  linux-build:
    name: linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      STAGE_DIR: ${{ github.workspace }}/stage/linux-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config libssl-dev zlib1g-dev

      - name: Configure
        run: |
          autoreconf -fi
          ./configure --prefix=/usr

      - name: Build
        run: make -j"$(nproc)"

      - name: Install staged files
        run: make install-nokeys DESTDIR="$STAGE_DIR"

      - name: Package artifact
        run: |
          tar -C stage -czf "openssh-linux-${{ matrix.arch }}.tar.gz" "linux-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssh-linux-${{ matrix.arch }}
          path: openssh-linux-${{ matrix.arch }}.tar.gz

  windows-build:
    name: windows-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: windows-2025
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    env:
      STAGE_DIR: stage/windows-${{ matrix.arch }}
      CONFIG: cygwin-release
    steps:
      - name: Set Cygwin git params
        run: git config --global core.autocrlf input

      - name: Install Cygwin
        id: cygwin_install
        uses: cygwin/cygwin-install-action@master
        env:
          CYGWIN: winsymlinks:native

      - uses: actions/checkout@v4

      - name: Setup CI system
        shell: bash
        run: sh ./.github/setup_ci.sh "$CONFIG" "${{ matrix.runner }}"
        env:
          CYGWIN_SETUP: ${{ steps.cygwin_install.outputs.setup }}

      - name: Autoreconf
        shell: bash
        run: sh -c autoreconf

      - name: Configure
        shell: bash
        run: sh ./.github/configure.sh "$CONFIG"

      - name: Build
        shell: bash
        run: make -j4

      - name: Install staged files
        shell: bash
        run: |
          mkdir -p "$STAGE_DIR"
          make install-nokeys DESTDIR="$STAGE_DIR"

      - name: Package artifact
        shell: bash
        run: |
          test -d "$STAGE_DIR"
          tar -C stage -czf "openssh-windows-${{ matrix.arch }}.tar.gz" "windows-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssh-windows-${{ matrix.arch }}
          path: openssh-windows-${{ matrix.arch }}.tar.gz
